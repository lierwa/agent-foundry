services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      AGENT_FOUNDRY_STORE_MODE: durable
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/agent_foundry
      REDIS_URL: redis://redis:6379
      DOUBAO_API_KEY: ${DOUBAO_API_KEY:-}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
    depends_on:
      - postgres
      - redis

  workbench:
    build:
      context: ..
      dockerfile: apps/workbench/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:4000
    depends_on:
      - api

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_foundry
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
